kind = "web"
previewPath = "/"
title = "ASIVANTA"
version = "1.0.0"
id = "artifacts/asivanta"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20535

[services.development]
run = "pnpm --filter @workspace/asivanta run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/asivanta", "run", "build" ]
publicDir = "artifacts/asivanta/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20535"
BASE_PATH = "/"
